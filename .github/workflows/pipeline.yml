name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore: ["README.md", "docs/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["README.md", "docs/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # JOB 1: Build & Lint (Heavy Lifting)
  # =========================================================
  build-lint:
    name: 🏗️ Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint Code
        run: bun run lint

      - name: Build Next.js App
        run: bun run build

      # Verify build
      - name: Verify standalone build
        run: |
          if [ ! -d ".next/standalone" ]; then
            echo "❌ Error: .next/standalone folder not found!"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1

  # =========================================================
  # JOB 2: Integration Test (Vitest)
  # =========================================================
  integration-test:
    name: 🧪 Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest
        shell: bash
        run: |
          if [ -d "tests" ]; then
            bun run test:unit --passWithNoTests
          else
            echo "⚠️ No 'tests' folder. Skipping."
          fi

  # =========================================================
  # JOB 3: E2E Test (Playwright)
  # =========================================================
  e2e-test:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build-lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .next

      - name: Check for E2E tests
        id: check_e2e
        shell: bash
        run: |
          if [ -d "e2e" ] && [ -n "$(find e2e -name '*.spec.ts' -o -name '*.test.ts' | head -n 1)" ]; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Playwright Browsers
        if: steps.check_e2e.outputs.tests_exist == 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright
        if: steps.check_e2e.outputs.tests_exist == 'true'
        run: bunx playwright test --project=chromium
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # =========================================================
  # JOB 4: Docker Build & Push
  # =========================================================
  docker:
    name: 🐳 Docker Release
    runs-on: ubuntu-latest
    needs: [e2e-test, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set repo name to lowercase
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
